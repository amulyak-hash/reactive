<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reactive Workspace</title>
  <style>
    :root {
      --bg: #050914;
      --bg-soft: #070c17;
      --panel: rgba(7, 12, 23, 0.94);
      --panel-strong: rgba(10, 16, 29, 0.98);
      --line: rgba(109, 123, 156, 0.12);
      --line-strong: rgba(109, 123, 156, 0.2);
      --text: #f5f7fb;
      --muted: rgba(245, 247, 251, 0.72);
      --muted-soft: rgba(156, 163, 175, 0.9);
      --blue: #5c83ff;
      --teal: #29cfd6;
      --teal-soft: rgba(41, 207, 214, 0.14);
      --gold: #9eb2ff;
      --gold-soft: rgba(158, 178, 255, 0.12);
      --red: #95a0b8;
      --yellow: #cfd7e6;
      --shadow-sm: 0 12px 30px rgba(0, 0, 0, 0.24);
      --shadow-md: 0 22px 54px rgba(0, 0, 0, 0.30);
      --shadow-lg: 0 28px 78px rgba(0, 0, 0, 0.36);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --sidebar-collapsed: 74px;
      --sidebar-expanded: 232px;
      --insights-width: min(420px, 34vw);
      --canvas-max: 1240px;
      --sans: "Satoshi", "Manrope", "Segoe UI", sans-serif;
      --serif: "Satoshi", "Manrope", "Segoe UI", sans-serif;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      --ease: cubic-bezier(.22, 1, .36, 1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 82%, rgba(24, 67, 139, 0.24), transparent 18%),
        linear-gradient(180deg, #040914 0%, #050913 100%);
      font-family: var(--sans);
    }

    body { overflow: hidden; }

    button, input { font: inherit; color: inherit; }

    button {
      border: 0;
      background: none;
      padding: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar-collapsed) 1fr;
      transition: grid-template-columns 240ms ease;
    }

    .app.history-open { grid-template-columns: var(--sidebar-expanded) 1fr; }
    .app.landing-mode { display: block; }

    .sidebar {
      position: relative;
      z-index: 18;
      width: 58px;
      margin: 18px 0 18px 10px;
      padding: 20px 7px 22px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-right: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(12, 20, 32, 0.95), rgba(17, 27, 40, 0.93));
      box-shadow: 0 12px 24px rgba(35, 40, 42, 0.06);
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
      transition: width 240ms ease, padding 240ms ease, margin 240ms ease;
    }

    .app.history-open .sidebar {
      width: 206px;
      padding-right: 12px;
    }

    .app.landing-mode .sidebar { display: none; }

    .rail-btn {
      display: grid;
      grid-template-columns: 24px 1fr;
      align-items: center;
      gap: 12px;
      min-height: 40px;
      padding: 8px 7px;
      border-radius: 14px;
      transition: background 160ms ease, color 160ms ease;
    }

    .rail-btn:hover,
    .history-item:hover,
    .lens-chip:hover,
    .saved-item:hover,
    .artifact-item:hover,
    .landing-card:hover { background: rgba(59, 139, 246, 0.08); }

    .rail-icon {
      display: grid;
      place-items: center;
      font-family: var(--sans);
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      width: 24px;
      height: 24px;
      color: #d7e4f7;
    }

    .rail-label {
      opacity: 0;
      transform: translateX(-6px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
    }

    .history-panel {
      opacity: 0;
      transform: translateX(-6px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      display: grid;
      gap: 8px;
      min-height: 0;
      overflow: hidden;
      padding-top: 6px;
    }

    .app.history-open .rail-label,
    .app.history-open .history-panel {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .history-divider {
      height: 1px;
      margin: 4px 0 8px;
      background: var(--line);
    }

    .history-list {
      display: grid;
      gap: 8px;
      overflow: auto;
      padding-right: 4px;
    }

    .history-item {
      text-align: left;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid transparent;
      background: rgba(17, 27, 40, 0.8);
      transition: border-color 160ms ease, background 160ms ease;
    }

    .history-item.active {
      border-color: rgba(59, 139, 246, 0.24);
      background: rgba(59, 139, 246, 0.12);
    }

    .history-title,
    .history-meta,
    .tool-btn,
    .landing-kicker,
    .landing-desc,
    .card-arrow,
    .table-header,
    .table-cell,
    .table-note,
    .question-echo,
    .type-pill,
    .insight-copy,
    .lens-chip,
    .footer-label,
    .input-shell input,
    .saved-meta,
    .artifact-meta,
    .metric-line,
    .panel-meta,
    .viewer-meta,
    .mini-note,
    .empty-copy {
      font-family: var(--sans);
    }

    .landing-kicker,
    .history-meta,
    .table-header,
    .question-echo,
    .footer-label,
    .saved-meta,
    .artifact-meta,
    .panel-meta,
    .viewer-meta,
    .mini-note {
      font-family: var(--mono);
      letter-spacing: 0.02em;
    }

    .history-title { font-size: 13px; font-weight: 600; line-height: 1.35; margin-bottom: 4px; }
    .history-meta { font-size: 11px; color: var(--muted); }

    .workspace {
      position: relative;
      min-width: 0;
      min-height: 100vh;
      overflow: hidden;
    }

    .canvas-shell {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .canvas {
      position: relative;
      height: 100%;
      overflow: auto;
      padding: 28px clamp(22px, 4vw, 54px) 168px;
      scroll-behavior: smooth;
      transition: opacity 200ms ease;
    }

    .canvas.dimmed { opacity: 0.42; }

    .canvas-inner {
      width: min(100%, var(--canvas-max));
      margin: 0 auto;
      position: relative;
      padding-top: 52px;
    }

    .app.landing-mode .canvas {
      height: 100vh;
      padding: 0;
      overflow: hidden;
    }

    .app.landing-mode .canvas-inner {
      width: 100%;
      max-width: none;
      margin: 0;
      padding-top: 0;
    }

    .app.landing-mode .workspace-main {
      min-height: 100vh;
    }

    .workspace-tools {
      position: fixed;
      top: 18px;
      left: calc(var(--sidebar-collapsed) + clamp(22px, 4vw, 54px));
      right: clamp(22px, 4vw, 54px);
      z-index: 20;
      width: min(calc(100% - var(--sidebar-collapsed) - (clamp(22px, 4vw, 54px) * 2)), var(--canvas-max));
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 0;
      pointer-events: none;
    }

    .workspace-tools::before {
      content: "";
      position: absolute;
      left: -56px;
      right: -56px;
      top: -24px;
      bottom: -18px;
      z-index: -1;
      background:
        radial-gradient(circle at 8% 12%, rgba(59, 139, 246, 0.10), transparent 26%),
        radial-gradient(circle at 92% 8%, rgba(34, 211, 238, 0.08), transparent 28%),
        linear-gradient(180deg, rgba(7, 11, 18, 0.94), rgba(12, 20, 32, 0.82) 64%, rgba(12, 20, 32, 0));
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    .app.history-open .workspace-tools {
      left: calc(var(--sidebar-expanded) + clamp(22px, 4vw, 54px));
      width: min(calc(100% - var(--sidebar-expanded) - (clamp(22px, 4vw, 54px) * 2)), var(--canvas-max));
    }

    .app.landing-mode .workspace-tools {
      display: none;
    }

    .workspace-tools > * { pointer-events: auto; }

    .workspace-tools-left,
    .workspace-tools-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tool-btn,
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 2px;
      border-radius: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      transition: color 160ms ease, opacity 160ms ease;
    }

    .tool-btn:hover,
    .back-btn:hover {
      color: var(--text);
      opacity: 1;
    }

    .tool-btn { opacity: 0.88; color: #a8b8d0; font-size: 14px; }
    .back-btn { color: #a8b8d0; }

    .landing {
      min-height: 100vh;
      display: grid;
      gap: 0;
      align-content: start;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .landing.exiting {
      opacity: 0;
      transform: translateY(-12px);
      pointer-events: none;
    }

    .landing-shell {
      min-height: 100vh;
      display: grid;
      gap: 0;
      color: #f5f7fb;
    }

    .landing-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      font-family: var(--sans);
    }

    .landing-brand-text {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      font-size: clamp(28px, 3vw, 42px);
      letter-spacing: -0.06em;
    }

    .landing-brand-text strong { font-weight: 500; }

    .landing-head {
      text-align: center;
      display: grid;
      gap: 8px;
      justify-items: center;
    }

    .landing-kicker { display: none; }

    .landing-title {
      font-size: clamp(36px, 4vw, 60px);
      line-height: 1.04;
      letter-spacing: -0.04em;
      color: #f5f7fb;
      max-width: 16ch;
    }

    .landing-util,
    .landing-avatar,
    .landing-prompt,
    .landing-chip,
    .landing-card {
      transition: transform 180ms var(--ease), border-color 180ms ease, background 180ms ease, opacity 180ms ease, box-shadow 180ms ease;
    }

    .landing-util {
      display: none;
    }

    .landing-prompt:hover,
    .landing-chip:hover,
    .landing-card:hover {
      transform: translateY(-1px);
    }

    .landing-avatar {
      display: none;
    }

    .landing-hero {
      position: relative;
      overflow: hidden;
      min-height: 100vh;
      border-radius: 0;
      background: linear-gradient(180deg, #080c17fa, #070b15);
      border: 0;
      box-shadow: none;
      padding: 28px 18px 22px;
      display: grid;
      grid-template-rows: 1fr;
    }

    .landing-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 82%, rgba(24, 67, 139, 0.34), transparent 18%),
        linear-gradient(180deg, rgba(4, 9, 20, 0.2), rgba(5, 9, 19, 0.12));
    }

    .landing-waves,
    .landing-waves::before,
    .landing-waves::after {
      position: absolute;
      content: "";
      pointer-events: none;
      bottom: -5%;
      height: 38%;
      background: radial-gradient(circle at 50% 50%, rgba(92, 131, 255, 0.14), transparent 60%);
      filter: blur(30px);
      opacity: 0.92;
      animation: wave-drift 16s ease-in-out infinite alternate;
    }

    .landing-waves {
      left: -14%;
      width: 40%;
      clip-path: ellipse(48% 36% at 58% 70%);
    }

    .landing-waves::before {
      left: 68%;
      width: 140%;
      height: 82%;
      opacity: 0.5;
      animation-duration: 18s;
      clip-path: ellipse(44% 28% at 50% 76%);
    }

    .landing-waves::after {
      left: 162%;
      width: 110%;
      height: 95%;
      animation-duration: 14s;
      clip-path: ellipse(44% 36% at 36% 68%);
    }

    .landing-orb-zone {
      position: relative;
      display: grid;
      place-items: center;
      align-self: stretch;
      align-content: center;
      gap: 20px;
      padding: 10px 0 0;
    }

    .landing-orb-glow {
      position: absolute;
      width: min(34vw, 420px);
      height: min(24vw, 300px);
      border-radius: 50%;
      background: radial-gradient(circle at center, rgba(84, 115, 255, 0.22), rgba(84, 115, 255, 0.06) 42%, transparent 70%);
      filter: blur(42px);
      opacity: 0.62;
      pointer-events: none;
    }

    .landing-orb {
      width: min(32vw, 400px);
      height: min(32vw, 400px);
      min-width: 220px;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      filter: drop-shadow(0 0 42px rgba(92, 131, 255, 0.18));
      opacity: 0.98;
      position: relative;
      z-index: 1;
    }

    .landing-orb svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .landing-prompt-area {
      position: relative;
      width: min(960px, calc(100% - 26px));
      z-index: 2;
      display: grid;
      gap: 14px;
    }

    .landing-prompt {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 68px;
      padding: 8px 8px 8px 18px;
      border-radius: 999px;
      background: rgba(19, 24, 35, 0.96);
      border: 1px solid rgba(107, 115, 135, 0.14);
      box-shadow:
        0 0 0 1px rgba(93, 236, 242, 0.18),
        0 0 18px rgba(41, 207, 214, 0.22),
        0 24px 48px rgba(0, 0, 0, 0.28);
      text-align: left;
      overflow: hidden;
      isolation: isolate;
    }

    .landing-prompt::before {
      content: "";
      position: absolute;
      inset: -26px -34px -32px;
      border-radius: inherit;
      background: radial-gradient(ellipse at center, rgba(41, 207, 214, 0.22) 0%, rgba(41, 207, 214, 0.12) 36%, rgba(41, 207, 214, 0.06) 58%, transparent 78%);
      filter: blur(18px);
      pointer-events: none;
    }

    .landing-prompt-copy,
    .landing-prompt-send {
      position: relative;
      z-index: 1;
    }

    .landing-prompt-copy {
      min-width: 0;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 14px;
      font-family: var(--sans);
      color: rgba(255, 255, 255, 0.82);
    }

    .landing-prompt-copy span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 18px;
      color: rgba(245, 247, 251, 0.84);
    }

    .landing-prompt-send {
      width: 48px;
      height: 48px;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.10);
      color: rgba(240, 244, 255, 0.9);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      font-size: 20px;
    }

    .landing-chip-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .landing-chip {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(8, 14, 26, 0.82);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      color: rgba(245, 247, 251, 0.84);
    }

    .landing-chip.strong {
      border-color: rgba(93, 236, 242, 0.24);
      color: #d9feff;
    }

    .landing-note {
      display: none;
    }

    .landing-floater { display: none !important; }

    .app.landing-mode .input-zone {
      display: none;
    }

    .thread,
    .empty-thread { display: none; }

    .thread.active {
      display: grid;
      gap: 18px;
    }

    .thread-stack {
      display: grid;
      gap: 14px;
    }

    .user-message {
      justify-self: end;
      max-width: min(46ch, 100%);
      padding: 11px 16px;
      border-radius: 18px 18px 8px 18px;
      border: 1px solid rgba(59, 139, 246, 0.28);
      background: rgba(22, 36, 56, 0.98);
      box-shadow: var(--shadow-sm);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.5;
      color: #f7fbff;
    }

    .empty-thread.active {
      display: grid;
      align-content: start;
      min-height: 54vh;
    }

    .response-card {
      border-radius: 24px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(12, 20, 32, 0.96), rgba(17, 27, 40, 0.96));
      box-shadow: var(--shadow-md);
      overflow: hidden;
      animation: card-enter 300ms ease-out both;
    }

    .response-card.highlight { animation: card-pulse 500ms ease; }

    .card-block { padding: 18px 20px; }
    .card-header,
    .card-body { border-bottom: 1px solid var(--line); }

    .card-header {
      display: grid;
      gap: 8px;
    }

    .question-echo {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      display: none;
    }

    .header-row,
    .header-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .header-main,
    .type-switcher,
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .response-title {
      font-size: 24px;
      line-height: 1.06;
      letter-spacing: -0.025em;
      margin-right: 10px;
    }

    .saved-badge,
    .artifact-badge,
    .severity-chip {
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.10);
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
    }

    .type-pill,
    .lens-chip,
    .bookmark-btn,
    .export-btn,
    .icon-btn,
    .panel-btn,
    .viewer-btn {
      border-radius: 999px;
      border: 1px solid transparent;
      background: rgba(59, 139, 246, 0.10);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    .type-pill,
    .lens-chip,
    .bookmark-btn,
    .export-btn,
    .icon-btn,
    .panel-btn,
    .viewer-btn { padding: 8px 11px; }

    .type-pill.active {
      background: var(--blue);
      color: #f8fbff;
    }

    .type-pill[disabled] { opacity: 0.34; cursor: not-allowed; }

    .type-pill:hover:not([disabled]),
    .lens-chip:hover,
    .bookmark-btn:hover,
    .export-btn:hover,
    .icon-btn:hover,
    .panel-btn:hover,
    .viewer-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(59, 139, 246, 0.28);
    }

    .header-actions {
      margin-left: auto;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 14px;
      line-height: 1;
    }

    .icon-btn.bookmarked {
      background: rgba(251, 191, 36, 0.18);
      color: #ffdc78;
      border-color: rgba(251, 191, 36, 0.20);
    }

    .followup-tray {
      margin-top: 14px;
    }

    .followup-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .followup-chip {
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid rgba(59, 139, 246, 0.18);
      background: rgba(59, 139, 246, 0.08);
      color: var(--text);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 600;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .followup-chip:hover {
      transform: translateY(-1px);
      border-color: rgba(59, 139, 246, 0.30);
      background: rgba(59, 139, 246, 0.14);
    }

    .bookmarked {
      background: rgba(205, 170, 88, 0.20);
      color: #ffdc78;
      border-color: rgba(251, 191, 36, 0.20);
    }

    .table-shell {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      overflow: hidden;
      background: transparent;
    }

    .table-head,
    .table-row {
      display: grid;
      width: 100%;
      grid-template-columns: 1.6fr 1.1fr 1.1fr 1.1fr .85fr .7fr;
      gap: 18px;
      align-items: center;
      padding: 12px 8px;
    }

    .table-head {
      background: transparent;
      border-bottom: 1px solid var(--line);
    }

    .table-row {
      width: 100%;
      border-bottom: 1px solid var(--line);
      transition: background 160ms ease, transform 160ms ease;
      text-align: left;
    }

    .table-row:last-child { border-bottom: 0; }
    .table-row:hover {
      background: rgba(59, 139, 246, 0.06);
      transform: none;
    }

    .table-header {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .table-cell {
      font-size: 12px;
      color: var(--text);
      line-height: 1.45;
      min-width: 0;

    function createLandingOrb() {
      const totalDots = 600;
      const dotRadius = 1;
      const duration = 3;
      const dotColor = '#7ABEBA';
      const margin = 2;
      const minOpacity = 0.3;
      const maxOpacity = 1;
      const minScale = 0.5;
      const maxScale = 1.5;
      const angle = Math.PI * (3 - Math.sqrt(5));
      const center = 200;
      const maxRadius = center - margin - dotRadius;
      let circles = '';

      for (let index = 0; index < totalDots; index += 1) {
        const step = index + 0.5;
        const ratio = step / totalDots;
        const radius = Math.sqrt(ratio) * maxRadius;
        const theta = step * angle;
        const x = center + radius * Math.cos(theta);
        const y = center + radius * Math.sin(theta);
        const begin = (ratio * duration).toFixed(2);
        const radiusLow = (dotRadius * minScale).toFixed(2);
        const radiusHigh = (dotRadius * maxScale).toFixed(2);

        circles += `
          <circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${dotRadius}" fill="${dotColor}" opacity="0">
            <animate attributeName="r" values="${radiusLow};${radiusHigh};${radiusLow}" dur="${duration}s" begin="${begin}s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" />
            <animate attributeName="opacity" values="${minOpacity};${maxOpacity};${minOpacity}" dur="${duration}s" begin="${begin}s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" />
          </circle>
        `;
      }

      return `
        <svg viewBox="0 0 400 400" aria-hidden="true" focusable="false">
          ${circles}
        </svg>
      `;
    }

      panelBody.innerHTML = `
        <div>
          <div class="section-label">Insights</div>
          <div class="insights-stack">
            <button class="selected-card" type="button" data-followup-source="${escapeHtml(vendorId)}">
              <div class="selected-title">${escapeHtml(data.title)}</div>
              <div class="metric-grid">
                ${data.selected.map(([label, value]) => `<div class="metric-line">${escapeHtml(label)}<strong>${escapeHtml(value)}</strong></div>`).join('')}
              </div>
            </button>
            ${data.cards.map(card => renderInsightCard(card)).join('')}
          </div>
        </div>
      `;
    }

    function renderBookmarks() {
      const saved = currentResponses().filter(item => state.bookmarks.has(item.id));
      bookmarksList.innerHTML = saved.length ? saved.map(item => `
        <button class="saved-item" type="button" data-jump="${item.id}">
          <div class="saved-top">
            <span class="saved-badge">${escapeHtml(item.formatLabel)}</span>
          </div>
          <div class="saved-question">${escapeHtml(item.question)}</div>
          <div class="saved-meta">${escapeHtml(item.timestamp)}</div>
        </button>
      `).join('') : `<div class="saved-item"><div class="saved-question">No bookmarked responses yet.</div><div class="saved-meta">Save a response from the thread to see it here.</div></div>`;
    }

    function renderArtifacts() {
      const generated = currentResponses().filter(item => item.format !== 'text');
      if (!generated.length) {
        artifactsList.innerHTML = `
          <div class="artifact-item">
            <div class="artifact-name">No artifacts generated yet.</div>
            <div class="artifact-meta">Generated outputs from this workspace will appear here once the thread produces them.</div>
          </div>
        `;
        return;
      }

      artifactsList.innerHTML = generated.map(item => `
        <button class="artifact-item" type="button" data-jump="${item.id}">
          <div class="artifact-top">
            <span class="artifact-badge">${escapeHtml(item.formatLabel)}</span>
          </div>
          <div class="artifact-name">${escapeHtml(item.title)}</div>
          <div class="artifact-meta">${escapeHtml(item.timestamp || '')}</div>
        </button>
      `).join('');
    }

    function renderTrendChart(points = []) {
      const numeric = points.map(([label, value]) => {
        const match = String(value).match(/-?\d+(\.\d+)?/);
        return { label, value: match ? Number(match[0]) : 0 };
      });
      const values = numeric.map(item => item.value);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const span = Math.max(max - min, 1);
      const chartPoints = numeric.map((item, index) => {
        const x = 28 + (index * (224 / Math.max(numeric.length - 1, 1)));
        const normalized = (item.value - min) / span;
        const y = 76 - normalized * 44;
        return `${x},${y}`;
      }).join(' ');
      return `
        <div class="trend-chart">
          <svg viewBox="0 0 280 96" aria-hidden="true">
            <path d="M28 76 L252 76" stroke="rgba(148,163,184,0.14)" stroke-width="1"></path>
            <polyline points="${chartPoints}" fill="none" stroke="rgba(41, 207, 214, 0.92)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
            ${numeric.map((item, index) => {
              const x = 28 + (index * (224 / Math.max(numeric.length - 1, 1)));
              const normalized = (item.value - min) / span;
              const y = 76 - normalized * 44;
              return `<circle cx="${x}" cy="${y}" r="${index === numeric.length - 1 ? 4 : 3}" fill="${index === numeric.length - 1 ? '#9eb2ff' : '#7abeBA'}"></circle>`;
            }).join('')}
          </svg>
          <div class="trend-axis">
            ${numeric.map(item => `<span>${escapeHtml(item.label.replace('Day ', 'D'))}</span>`).join('')}
          </div>
        </div>
      `;
    }

    function renderInsightCard(card) {
      const conciseNotes = {
        'Silicon deviation trend — last 30 days': '4-week upward drift. This looks like source-batch instability, not a one-off spike.',
        'Which furnaces are receiving this material': 'Most of the deviated silicon is flowing to BF-3, so that is where the impact concentrates.',
        'Supplier X vs other silicon suppliers': 'Supplier X is the only out-of-spec silicon source this month.',
        'NCE history for Supplier X': 'NCE rose from zero to ₹1.8 Cr as deviation crossed 0.08%.',
        'Superheat reading over last 7 days': 'Seven straight days down. The decline lines up with the supplier deviation increase.',
        'BF-3 vs BF-5 superheat comparison': 'BF-3 is off target while BF-5 stays near normal, pointing to a localized upstream issue.',
        'Impact on downstream CCM assignment': 'CCM-3 takes most of BF-3 output, so it is carrying the main downstream exposure.',
        'Historical frequency of BF-3 going below 28°C': 'June is already the worst compliance month on record for BF-3.',
        'Solidification rate deviation over time': 'CCM-3 dropped out of band two days after BF-3 slipped, matching the expected process lag.',
        'Grade output impact this month': 'Premium grades are taking the hardest hit, which raises both quality and margin risk.',
        'CCM-3 vs CCM-1 comparison': 'CCM-1 is stable, so the issue reads as input-driven rather than machine-driven.',
        'Automotive grade pass rate — last 6 months': 'Automotive compliance stayed steady until June, then broke sharply.',
        'Customer commitment vs projected delivery': 'At the current run rate, the quarter finishes short unless the chain is corrected quickly.',
        'Revenue at risk': 'The shortfall is now large enough to create material revenue exposure.'
      };
      let body = '';
      if (card.type === 'line') {
        body = card.points ? renderTrendChart(card.points) : `<div class="mini-chart"></div>`;
      } else if (card.type === 'bars') {
        body = `
          <div class="mini-bars">
            ${card.rows.map(([label, value, status]) => `
              <div class="mini-bar-row">
                <span>${escapeHtml(label)}</span>
                <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${value}%"></div></div>
                <span>${escapeHtml(status)}</span>
              </div>
            `).join('')}
          </div>
        `;
      } else if (card.type === 'flags') {
        body = `
          <div class="mini-flags">
            ${card.flags.map(([label, contract, severity, date]) => `
              <div class="flag-row">
                <span class="flag-dot" style="background:${severity === 'High' ? 'var(--red)' : severity === 'Medium' ? 'var(--yellow)' : 'var(--teal)'}"></span>
                <span>${escapeHtml(label)}<br><span class="mini-note">${escapeHtml(contract)}</span></span>
                <span>${escapeHtml(date)}</span>
              </div>
            `).join('')}
          </div>
        `;
      } else if (card.type === 'compare') {
        body = `
          <div class="mini-compare">
            ${card.compare.map(([name, bid, nce, percent]) => `
              <div class="compare-row">
                <span>${escapeHtml(name)}</span>
                <span>${escapeHtml(bid)}</span>
                <span>${escapeHtml(nce)}</span>
                <span>${escapeHtml(percent)}</span>
              </div>
            `).join('')}
          </div>
        `;
      } else if (card.type === 'stats') {
        body = `
          <div class="mini-stats">
            ${card.stats.map(([label, value]) => `
              <div class="stat-row">
                <span>${escapeHtml(label)}</span>
                <strong>${escapeHtml(value)}</strong>
              </div>
            `).join('')}
          </div>
        `;
      }

      return `
        <button class="insight-card" type="button" data-followup-source="${escapeHtml(card.followupSource || card.title)}">
          <h4>${escapeHtml(card.title)}</h4>
          ${body}
          ${(card.note || conciseNotes[card.title]) ? `<div class="insight-takeaway"><strong>Takeaway</strong>${escapeHtml(conciseNotes[card.title] || card.note)}</div>` : ''}
        </button>
      `;
    }

    function visibleResponseIndex() {
      const cards = [...thread.querySelectorAll('.response-card')];
      if (!cards.length) return 0;
      const canvasRect = canvas.getBoundingClientRect();
      const center = canvasRect.top + canvasRect.height / 2;
      let best = 0;
      let bestDistance = Infinity;
      cards.forEach((card, index) => {
        const rect = card.getBoundingClientRect();
        const distance = Math.abs((rect.top + rect.height / 2) - center);
        if (distance < bestDistance) {
          bestDistance = distance;
          best = index;
        }
      });
      return best;
    }

    function renderTimeline() {
      const responses = currentResponses();
      const visible = state.mode === 'thread' && responses.length >= 2;
      timelineRail.classList.toggle('visible', visible);
      if (!visible) {
        timelineSegments.innerHTML = '';
        return;
      }
      const active = visibleResponseIndex();
      timelineSegments.innerHTML = responses.map((response, index) => `<button class="timeline-segment ${index === active ? 'active' : ''}" type="button" data-index="${index}"></button>`).join('');
      document.getElementById('scrollUp').disabled = active <= 0;
      document.getElementById('scrollDown').disabled = active >= responses.length - 1;
    }

    function openWorkspaceWithResponse(response) {
      state.mode = 'thread';
      state.centeredInput = false;
      state.threads.current = [response];
      state.currentThreadId = 'current';
      resetPanels();
      composerInput.value = response.question;
      composerInput.placeholder = 'ask a follow-up...';
    }

    function renderVisibility() {
      app.classList.toggle('landing-mode', state.mode === 'landing');
      app.classList.toggle('history-open', state.historyOpen && state.mode !== 'landing');
      toggleHistoryIcon.textContent = state.historyOpen ? '◂' : '▸';
      toggleHistoryLabel.textContent = state.historyOpen ? 'Collapse' : 'Expand';
      landing.style.display = state.mode === 'landing' ? 'grid' : 'none';
      landing.classList.remove('exiting');
      landingFloater.style.display = state.mode === 'landing' ? 'block' : 'none';
      workspaceTools.style.display = state.mode === 'landing' ? 'none' : 'flex';
      thread.classList.toggle('active', state.mode === 'thread');
      emptyThread.classList.toggle('active', state.mode === 'empty');
      inputZone.classList.toggle('centered', state.centeredInput);
    }

    function renderPanels() {
      const drillOpen = state.mode !== 'landing' && state.activePanel === 'drill';
      const bookmarksOpen = state.mode !== 'landing' && state.activePanel === 'bookmarks';
      const artifactsOpen = state.mode !== 'landing' && state.activePanel === 'artifacts';
      panel.classList.toggle('open', drillOpen);
      bookmarksSheet.classList.toggle('open', bookmarksOpen);
      artifactsSheet.classList.toggle('open', artifactsOpen);
      workspaceMain.classList.toggle('with-panel', drillOpen);
      workspaceMain.classList.toggle('with-sheet', bookmarksOpen || artifactsOpen);
      inputZone.classList.toggle('with-panel', drillOpen);
      inputZone.classList.toggle('with-sheet', bookmarksOpen || artifactsOpen);
      canvas.classList.remove('dimmed');
    }

    function renderAll() {
      renderLanding();
      renderEmptyThread();
      renderThread();
      renderHistory();
      renderComposerStarters();
      renderBookmarks();
      renderArtifacts();
      renderVisibility();
      renderPanels();
      renderTimeline();
    }

    function switchFormat(responseId, nextFormat) {
      const response = currentResponses().find(item => item.id === responseId);
      if (!response) return;
      response.format = nextFormat;
      response.formatLabel = nextFormat === 'table' ? 'Table' : nextFormat === 'bar' ? 'Bar Chart' : nextFormat === 'line' ? 'Line Chart' : 'Text';
      state.exportOpenFor = null;
      renderAll();
    }

    function addLens(responseId, lens) {
      const next = baseResponse(lens);
      currentResponses().push(next);
      renderAll();
      requestAnimationFrame(() => scrollToResponse(next.id));
    }

    function toggleBookmark(responseId) {
      if (state.bookmarks.has(responseId)) state.bookmarks.delete(responseId);
      else state.bookmarks.add(responseId);
      renderAll();
    }

    function showFollowups(responseId, source) {
      const prompts = followupsForSource(source);
      state.followupContext = prompts.length ? { responseId, prompts, source } : null;
      renderAll();
    }

    function scrollToResponse(responseId) {
      const target = document.getElementById(`response-${responseId}`);
      if (!target) return;
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      target.classList.add('highlight');
      setTimeout(() => target.classList.remove('highlight'), 500);
    }

    document.getElementById('starterButton').addEventListener('click', () => {
      state.mode = 'empty';
      state.centeredInput = true;
      resetPanels();
      composerInput.value = '';
      composerInput.placeholder = 'What would you like to explore?';
      renderAll();
      setTimeout(() => composerInput.focus(), 200);
    });

    document.getElementById('backToLanding').addEventListener('click', () => {
      state.mode = 'landing';
      state.centeredInput = false;
      state.historyOpen = false;
      resetPanels();
      composerInput.value = '';
      composerInput.placeholder = 'ask a follow-up...';
      renderAll();
      canvas.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.getElementById('toggleHistory').addEventListener('click', () => {
      if (state.mode === 'landing') return;
      state.historyOpen = !state.historyOpen;
      renderAll();
    });

    document.getElementById('historyButton').addEventListener('click', () => {
      if (state.mode === 'landing') return;
      state.historyOpen = true;
      renderAll();
    });

    document.getElementById('newThread').addEventListener('click', () => {
      state.mode = 'empty';
      state.centeredInput = true;
      state.historyOpen = false;
      state.threads.current = [];
      composerInput.value = '';
      composerInput.placeholder = 'What would you like to explore?';
      resetPanels();
      renderAll();
      setTimeout(() => composerInput.focus(), 180);
    });

    document.getElementById('bookmarksButton').addEventListener('click', () => {
      if (state.mode === 'landing') return;
      state.activePanel = state.activePanel === 'bookmarks' ? null : 'bookmarks';
      renderAll();
    });

    document.getElementById('artifactsButton').addEventListener('click', () => {
      if (state.mode === 'landing') return;
      state.activePanel = state.activePanel === 'artifacts' ? null : 'artifacts';
      renderAll();
    });

    composer.addEventListener('submit', event => {
      event.preventDefault();
      const value = composerInput.value.trim();
      if (!value) return;
      if (state.mode !== 'thread') {
        state.mode = 'thread';
        state.centeredInput = false;
      }
      const next = baseResponse(value);
      currentResponses().push(next);
      composerInput.value = '';
      composerInput.placeholder = 'ask a follow-up...';
      renderAll();
      requestAnimationFrame(() => scrollToResponse(next.id));
    });

    canvas.addEventListener('scroll', () => {
      renderTimeline();
      if (state.historyOpen) {
        state.historyOpen = false;
        renderAll();
      }
    });

    document.addEventListener('click', event => {
      const startEmptyTrigger = event.target.closest('[data-start-empty]');
      if (startEmptyTrigger) {
        state.mode = 'empty';
        state.centeredInput = true;
        state.historyOpen = false;
        resetPanels();
        composerInput.value = '';
        composerInput.placeholder = 'What would you like to explore?';
        renderAll();
        setTimeout(() => composerInput.focus(), 180);
        return;
      }

      const topicCard = event.target.closest('[data-topic]');
      if (topicCard) {
        const card = landingCards.find(item => item.key === topicCard.dataset.topic);
        if (!card) return;
        state.reviewed.add(card.key);
        topicCard.classList.add('selected');
        landing.classList.add('exiting');
        setTimeout(() => {
          openWorkspaceWithResponse(baseResponse(card.title));
          renderAll();
          canvas.scrollTo({ top: 0, behavior: 'smooth' });
        }, 180);
        return;
      }

      const starterBtn = event.target.closest('[data-starter]');
      if (starterBtn) {
        const starter = starterBtn.dataset.starter;
        if (!starter) return;
        const next = baseResponse(starter);
        state.mode = 'thread';
        state.centeredInput = false;
        state.threads.current = [next];
        state.currentThreadId = 'current';
        resetPanels();
        composerInput.value = starter;
        composerInput.placeholder = 'ask a follow-up...';
        renderAll();
        canvas.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }

      const closeBtn = event.target.closest('[data-close]');
      if (closeBtn) {
        if (closeBtn.dataset.close === 'bookmarks' || closeBtn.dataset.close === 'artifacts' || closeBtn.dataset.close === 'panel') {
          state.activePanel = null;
          if (closeBtn.dataset.close === 'panel') {
            state.selectedEntity = null;
            state.panelResponseId = null;
          }
        }
        renderAll();
        return;
      }

      const switchBtn = event.target.closest('[data-switch]');
      if (switchBtn) {
        switchFormat(switchBtn.dataset.responseId, switchBtn.dataset.switch);
        return;
      }

      const lensBtn = event.target.closest('[data-lens]');
      if (lensBtn) {
        addLens(lensBtn.dataset.responseId, lensBtn.dataset.lens);
        return;
      }

      const followupSourceBtn = event.target.closest('[data-followup-source]');
      if (followupSourceBtn && state.activePanel === 'drill') {
        if (state.panelResponseId) {
          showFollowups(state.panelResponseId, followupSourceBtn.dataset.followupSource);
        }
        return;
      }

      const flowNode = event.target.closest('[data-flow-node]');
      if (flowNode) {
        const responseCard = flowNode.closest('.response-card');
        state.selectedEntity = flowNode.dataset.flowNode;
        state.panelResponseId = responseCard?.dataset.responseId || null;
        renderDrillPanel(flowNode.dataset.flowNode);
        state.activePanel = 'drill';
        if (state.panelResponseId) showFollowups(state.panelResponseId, flowNode.dataset.flowNode);
        renderAll();
        return;
      }

      const vendorRow = event.target.closest('[data-vendor]');
      if (vendorRow) {
        const responseCard = vendorRow.closest('.response-card');
        state.selectedEntity = vendorRow.dataset.vendor;
        state.panelResponseId = responseCard?.dataset.responseId || null;
        renderDrillPanel(vendorRow.dataset.vendor);
        state.activePanel = 'drill';
        if (state.panelResponseId) showFollowups(state.panelResponseId, vendorRow.dataset.vendor);
        renderAll();
        return;
      }

      const entityBtn = event.target.closest('[data-entity]');
      if (entityBtn) {
        const responseCard = entityBtn.closest('.response-card');
        state.selectedEntity = entityBtn.dataset.entity;
        state.panelResponseId = responseCard?.dataset.responseId || null;
        renderDrillPanel(entityBtn.dataset.entity);
        state.activePanel = 'drill';
        if (state.panelResponseId) showFollowups(state.panelResponseId, entityBtn.dataset.entity);
        renderAll();
        return;
      }

      const followupBtn = event.target.closest('[data-followup]');
      if (followupBtn) {
        const next = followupResponse(followupBtn.dataset.followup);
        state.activePanel = null;
        state.selectedEntity = null;
        state.panelResponseId = null;
        state.followupContext = null;
        currentResponses().push(next);
        composerInput.value = '';
        composerInput.placeholder = 'ask a follow-up...';
        renderAll();
        requestAnimationFrame(() => scrollToResponse(next.id));
        return;
      }

      const bookmarkBtn = event.target.closest('[data-bookmark]');
      if (bookmarkBtn) {
        toggleBookmark(bookmarkBtn.dataset.bookmark);
        return;
      }

      const exportBtn = event.target.closest('[data-export]');
      if (exportBtn) {
        state.exportOpenFor = state.exportOpenFor === exportBtn.dataset.export ? null : exportBtn.dataset.export;
        renderAll();
        return;
      }

      const jumpBtn = event.target.closest('[data-jump]');
      if (jumpBtn) {
        state.activePanel = null;
        renderAll();
        setTimeout(() => scrollToResponse(jumpBtn.dataset.jump), 180);
        return;
      }

      const historyBtn = event.target.closest('[data-thread]');
      if (historyBtn) {
        state.currentThreadId = historyBtn.dataset.thread;
        if (!state.threads[state.currentThreadId]) {
          state.threads[state.currentThreadId] = [baseResponse('Vendor Leaderboard')];
        }
        state.mode = 'thread';
        state.centeredInput = false;
        state.historyOpen = false;
        resetPanels();
        renderAll();
        return;
      }

      const timelineBtn = event.target.closest('[data-index]');
      if (timelineBtn) {
        const target = currentResponses()[Number(timelineBtn.dataset.index)];
        if (target) scrollToResponse(target.id);
      }
    });

    timelineSegments.addEventListener('mouseover', event => {
      const segment = event.target.closest('[data-index]');
      if (!segment) return;
      const response = currentResponses()[Number(segment.dataset.index)];
      if (!response) return;
      timelineTooltip.innerHTML = `${escapeHtml(response.question)}<br>${escapeHtml(response.formatLabel)} · ${escapeHtml(response.timestamp)}`;
      timelineTooltip.style.top = `${segment.offsetTop + 12}px`;
      timelineTooltip.classList.add('visible');
    });

    timelineSegments.addEventListener('mouseout', event => {
      if (event.target.closest('[data-index]')) timelineTooltip.classList.remove('visible');
    });

    document.getElementById('scrollUp').addEventListener('click', () => {
      const responses = currentResponses();
      const active = visibleResponseIndex();
      if (active > 0) scrollToResponse(responses[active - 1].id);
    });

    document.getElementById('scrollDown').addEventListener('click', () => {
      const responses = currentResponses();
      const active = visibleResponseIndex();
      if (active < responses.length - 1) scrollToResponse(responses[active + 1].id);
    });

    window.addEventListener('resize', renderTimeline);

    renderAll();
  </script>
</body>
</html>
